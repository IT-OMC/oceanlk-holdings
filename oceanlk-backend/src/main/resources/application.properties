spring.application.name=oceanlk-backend
server.port=${SERVER_PORT:8080}

# MongoDB Configuration
# IMPORTANT: MongoDB URI must be set via environment variable for security
# Set MONGODB_URI environment variable with full connection string
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/oceanlk}

# Connection Pool Configuration
spring.data.mongodb.max-pool-size=100
spring.data.mongodb.min-pool-size=10
spring.data.mongodb.max-connection-idle-time=60000

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Email Configuration (SMTP)
# Note: Configure these values with your actual SMTP credentials
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:localhost}

# Email From Address
app.email.from=${EMAIL_FROM:noreply@oceanlk.com}
app.email.hr=${EMAIL_HR:hr@oceanlk.com}
app.email.enabled=${EMAIL_ENABLED:false}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:dev-secret-key-must-be-long-enough-for-security-policy-256-bits}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Default Admin Credentials (for initial setup only)
# IMPORTANT: Override these in production via environment variables
# Change these immediately after first login
default.admin.username=${DEFAULT_ADMIN_USERNAME:admin}
default.admin.password=${DEFAULT_ADMIN_PASSWORD:admin123}
default.superadmin.username=${DEFAULT_SUPERADMIN_USERNAME:superadmin}
default.superadmin.password=${DEFAULT_SUPERADMIN_PASSWORD:superadmin123}

