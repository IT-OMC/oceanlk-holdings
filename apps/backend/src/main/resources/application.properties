spring.application.name=oceanlk-backend
server.port=${SERVER_PORT:8080}

# MongoDB Configuration
# REQUIRED: Set MONGODB_URI environment variable — no fallback (fail-fast)
spring.data.mongodb.uri=${MONGODB_URI}

# Connection Pool Configuration
spring.data.mongodb.max-pool-size=100
spring.data.mongodb.min-pool-size=10
spring.data.mongodb.max-connection-idle-time=60000

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Email Configuration (SMTP)
# Note: Configure these values with your actual SMTP credentials
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
# REQUIRED in production: set MAIL_USERNAME and MAIL_PASSWORD env vars
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:localhost}

# Email From Address
app.email.from=${EMAIL_FROM:noreply@oceanlk.com}
app.email.hr=${EMAIL_HR:none}
app.email.enabled=${EMAIL_ENABLED:false}

# Rate Limiting Configuration
app.rate-limit.max-requests=${RATE_LIMIT_MAX:20}
app.rate-limit.window-ms=${RATE_LIMIT_WINDOW:60000}

# JWT Configuration
# REQUIRED: Generate with: openssl rand -base64 32
# No fallback — application will refuse to start if JWT_SECRET is not set
app.jwt.secret=${JWT_SECRET}
# Default expiry reduced from 24h to 1h for defence-in-depth
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# Redis Configuration (for distributed rate limiting)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Gemini API Configuration
# IMPORTANT: Set GEMINI_API_KEY environment variable
# Get your API key from: https://aistudio.google.com/
# Example: export GEMINI_API_KEY=your_api_key_here (Linux/Mac)
#          $env:GEMINI_API_KEY="your_api_key_here" (Windows PowerShell)
