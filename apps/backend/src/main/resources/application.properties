spring.application.name=oceanlk-backend
server.port=${SERVER_PORT:8080}

# MongoDB Configuration
# IMPORTANT: MongoDB URI must be set via environment variable for security
# Set MONGODB_URI environment variable with full connection string
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/oceanlk}

# Connection Pool Configuration
spring.data.mongodb.max-pool-size=100
spring.data.mongodb.min-pool-size=10
spring.data.mongodb.max-connection-idle-time=60000

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Email Configuration (SMTP)
# Note: Configure these values with your actual SMTP credentials
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:localhost}

# Email From Address
app.email.from=${EMAIL_FROM:noreply@oceanlk.com}
app.email.hr=${EMAIL_HR:none}
app.email.enabled=${EMAIL_ENABLED:false}

# Rate Limiting Configuration
app.rate-limit.max-requests=${RATE_LIMIT_MAX:20}
app.rate-limit.window-ms=${RATE_LIMIT_WINDOW:60000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:dev-secret-key-must-be-long-enough-for-security-policy-256-bits}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Default Admin Credentials (MUST be set via environment variables in production)
# IMPORTANT: These are disabled by default to prevent unauthorized access.
# default.admin.username=${DEFAULT_ADMIN_USERNAME}
# default.admin.password=${DEFAULT_ADMIN_PASSWORD}
# default.superadmin.username=${DEFAULT_SUPERADMIN_USERNAME}
# default.superadmin.password=${DEFAULT_SUPERADMIN_PASSWORD}


# Gemini API Configuration
# IMPORTANT: Set GEMINI_API_KEY environment variable
# Get your API key from: https://aistudio.google.com/
# Example: export GEMINI_API_KEY=your_api_key_here (Linux/Mac)
#          $env:GEMINI_API_KEY="your_api_key_here" (Windows PowerShell)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
gemini.api.system-prompt=You are a helpful and knowledgeable AI assistant for Ocean Ceylon Holdings (OceanLK), a conglomerate established in 1990. Your goal is to assist users with inquiries about our services, which include investment management, real estate, and corporate leadership. \n\nCompany Overview:\n- Tagline: "A Legacy of Trust, A Future of Innovation."\n- Vision: To be the most trusted and innovative conglomerate in the region, driving sustainable growth and creating lasting value for all stakeholders.\n- Mission: To deliver exceptional value through operational excellence, strategic innovation, and unwavering commitment to our core values and sustainable practices in every sector we operate.\n- Purpose: To be the catalyst for sustainable growth and innovation, bridging local potential with global opportunities to create lasting value for our nation and the world.\n\nBe professional, polite, and concise. If you don't know an answer, kindly ask the user to contact support at +94 112 345 678 or info@oceanlk.com.
