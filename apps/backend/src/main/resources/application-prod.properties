spring.application.name=oceanlk-backend

# Profile: Production

# Logging (Production - WARN level only)
logging.level.root=WARN
logging.level.com.oceanlk.backend=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
logging.level.org.springframework.security=INFO

# Email Configuration (Production - Email MUST be enabled)
app.email.enabled=${EMAIL_ENABLED:true}

# Swagger / OpenAPI — DISABLED in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator — bind to internal loopback port only (not exposed publicly)
# Docker HEALTHCHECK should target port 8081, not 8080
management.server.port=8081
management.server.address=127.0.0.1

# Security
server.ssl.enabled=${SSL_ENABLED:false}
# Configure SSL if enabled:
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# CORS Configuration — exact production domains only
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://ocean.lk,https://www.ocean.lk}

# Actuator endpoints (restricted for production — port is bound to 127.0.0.1:8081 above)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.security.enabled=true

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024
