name: Deploy Backend to Railway

on:
  push:
    branches:
      - production
      - development
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy.yml'

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4

jobs:
  # ==================================================================================
  # DETERMINE ENVIRONMENT
  # ==================================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.check-changes.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set Environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Check for Backend Changes
        id: check-changes
        run: |
          # Check if backend files changed
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/backend/"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # ==================================================================================
  # BACKEND DEPLOYMENT TO RAILWAY
  # ==================================================================================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.deploy == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Service Name
        id: service-name
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            echo "service=backend" >> $GITHUB_OUTPUT
          else
            echo "service=backend-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Backend to Railway
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying backend to Railway (${{ needs.setup.outputs.environment }})"
          echo "Service: ${{ steps.service-name.outputs.service }}"
          railway link ${{ env.RAILWAY_PROJECT_ID }}
          railway up --service ${{ steps.service-name.outputs.service }}
          
      - name: Deployment Success
        run: |
          echo "✅ Backend deployed successfully to ${{ needs.setup.outputs.environment }}"
          echo "Monitor deployment: https://railway.app/project/${{ env.RAILWAY_PROJECT_ID }}"

  # ==================================================================================
  # NOTIFY - DEPLOYMENT SUMMARY
  # ==================================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "🎉 Backend Deployment Summary"
          echo "=============================="
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Backend Deployed: ${{ needs.setup.outputs.deploy }}"
          echo ""
          echo "Railway Project: 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4"
          echo "Dashboard: https://railway.app/project/457dd5f2-6d1d-4bb3-9d62-676a3836f8b4"
          echo ""
          echo "Note: Frontend is deployed separately on Vercel"
