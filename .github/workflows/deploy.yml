name: Deploy to Railway

on:
  push:
    branches:
      - production
      - development
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - '.github/workflows/deploy.yml'

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # ==================================================================================
  # DETERMINE ENVIRONMENT
  # ==================================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      backend-changed: ${{ steps.check-changes.outputs.backend }}
      frontend-changed: ${{ steps.check-changes.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set Environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Check for Changes
        id: check-changes
        run: |
          # Check if backend files changed
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if frontend files changed
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ==================================================================================
  # BACKEND DEPLOYMENT
  # ==================================================================================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.backend-changed == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Service Names
        id: service-names
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            echo "service=backend" >> $GITHUB_OUTPUT
          else
            echo "service=backend-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Backend to Railway
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4
        run: |
          echo "🚀 Deploying backend to Railway (${{ needs.setup.outputs.environment }})"
          railway link 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4
          railway up --service ${{ steps.service-names.outputs.service }}
          
      - name: Verify Deployment
        run: |
          echo "✅ Backend deployment initiated"
          echo "Monitor deployment at: https://railway.app/project/${{ steps.service-names.outputs.project }}"

  # ==================================================================================
  # FRONTEND DEPLOYMENT
  # ==================================================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.frontend-changed == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Service Names
        id: service-names
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            echo "service=frontend" >> $GITHUB_OUTPUT
          else
            echo "service=frontend-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Frontend to Railway
        working-directory: apps/frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4
        run: |
          echo "🚀 Deploying frontend to Railway (${{ needs.setup.outputs.environment }})"
          railway link 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4
          railway up --service ${{ steps.service-names.outputs.service }}
          
      - name: Verify Deployment
        run: |
          echo "✅ Frontend deployment initiated"
          echo "Monitor deployment at: https://railway.app/project/${{ steps.service-names.outputs.project }}"

  # ==================================================================================
  # POST-DEPLOYMENT NOTIFICATION
  # ==================================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "🎉 Deployment Summary"
          echo "===================="
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Backend Deployed: ${{ needs.setup.outputs.backend-changed }}"
          echo "Frontend Deployed: ${{ needs.setup.outputs.frontend-changed }}"
          echo ""
          echo "Railway Project ID: 457dd5f2-6d1d-4bb3-9d62-676a3836f8b4"
          echo "Dashboard: https://railway.app/project/457dd5f2-6d1d-4bb3-9d62-676a3836f8b4"
