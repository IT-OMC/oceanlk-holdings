name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - production
      - development
    paths:
      - 'oceanlk-backend/**'
      - 'oceanlk-frontend/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1 # Change this to your preferred region (e.g., asia-south1 for Sri Lanka proximity)

jobs:
  # ==================================================================================
  # BACKEND DEPLOYMENT
  # ==================================================================================
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (contains(github.event.head_commit.modified, 'oceanlk-backend/') || contains(github.event.head_commit.modified, '.github/workflows/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticte to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      # Determine environment (Prod vs Test)
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "SERVICE_NAME=oceanlk-backend-test" >> $GITHUB_ENV
            echo "ENV_TAG=test" >> $GITHUB_ENV
          else
            echo "SERVICE_NAME=oceanlk-backend" >> $GITHUB_ENV
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          fi

      - name: Build and Push Container
        run: |
          cd oceanlk-backend
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: gcr.io/$PROJECT_ID/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--port=8080 --allow-unauthenticated'
          env_vars: |
            SPRING_PROFILES_ACTIVE=${{ env.ENV_TAG }}

  # ==================================================================================
  # FRONTEND DEPLOYMENT
  # ==================================================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (contains(github.event.head_commit.modified, 'oceanlk-frontend/') || contains(github.event.head_commit.modified, '.github/workflows/'))
    needs: deploy-backend # Optional: deploy frontend after backend to ensure API acts correctly? typically parallel is fine, but for first run maybe sequential. I'll make it parallel for speed.
    # actually removing 'needs' to run in parallel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticte to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      # Determine environment (Prod vs Test)
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "SERVICE_NAME=oceanlk-frontend-test" >> $GITHUB_ENV
          else
            echo "SERVICE_NAME=oceanlk-frontend" >> $GITHUB_ENV
          fi

      - name: Build and Push Container
        run: |
          cd oceanlk-frontend
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: gcr.io/$PROJECT_ID/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--port=80 --allow-unauthenticated'
