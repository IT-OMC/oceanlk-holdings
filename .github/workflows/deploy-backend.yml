name: Deploy Fullstack to Oracle Cloud

on:
  push:
    branches: [ "production", "development" ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: cd apps/backend && mvn clean package -DskipTests
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: apps/backend/target/*.jar
    - name: Upload Backend Dockerfile
      uses: actions/upload-artifact@v4
      with:
        name: backend-dockerfile
        path: apps/backend/Dockerfile

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json
    - name: Set Environment Variables for Build
      run: |
        # VITE_API_BASE_URL is intentionally empty so the frontend uses relative URLs.
        # Nginx reverse proxy handles forwarding /api/ requests to the backend container.
        echo "VITE_API_BASE_URL=" >> apps/frontend/.env
    - name: Install dependencies
      run: cd apps/frontend && npm install
    - name: Build Frontend
      run: cd apps/frontend && npm run build
    - name: Upload Frontend Assets
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: apps/frontend/dist/

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Prepare Deploy Directory
      run: mkdir -p deploy/backend deploy/frontend
      
    - name: Download Backend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: deploy/backend
    - name: Download Backend Dockerfile
      uses: actions/download-artifact@v4
      with:
        name: backend-dockerfile
        path: deploy/backend

    - name: Download Frontend Assets
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: deploy/frontend/dist

    - name: Set Environment Variables
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
          echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          echo "BACKEND_PORT=8080" >> $GITHUB_ENV
          echo "FRONTEND_PORT=3000" >> $GITHUB_ENV
          echo "BACKEND_CONTAINER=oceanlk-backend-prod" >> $GITHUB_ENV
          echo "FRONTEND_CONTAINER=oceanlk-frontend-prod" >> $GITHUB_ENV
        else
          echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          echo "BACKEND_PORT=8081" >> $GITHUB_ENV
          echo "FRONTEND_PORT=3001" >> $GITHUB_ENV
          echo "BACKEND_CONTAINER=oceanlk-backend-dev" >> $GITHUB_ENV
          echo "FRONTEND_CONTAINER=oceanlk-frontend-dev" >> $GITHUB_ENV
        fi

    - name: Create Backend .env file
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
          echo "${{ secrets.ENV_PROD }}" > deploy/backend/.env
        else
          echo "${{ secrets.ENV_DEV }}" > deploy/backend/.env
        fi

    - name: Create Frontend Dockerfile
      run: |
        cat > deploy/frontend/Dockerfile << 'EOF'
        FROM nginx:alpine
        COPY dist /usr/share/nginx/html
        COPY nginx.conf /etc/nginx/conf.d/default.conf
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
        EOF

    - name: Create Frontend Nginx Config
      run: |
        cat > deploy/frontend/nginx.conf << EOF
        server {
            listen 80;
            server_name _;

            # Serve frontend static files
            location / {
                root /usr/share/nginx/html;
                try_files \$uri \$uri/ /index.html;
                
                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
            }

            # Proxy API requests to backend container
            location /api/ {
                proxy_pass http://${{ env.BACKEND_CONTAINER }}:8080/api/;
                proxy_http_version 1.1;
                
                # Proxy headers
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                
                # Timeouts
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
        EOF

    - name: Deploy to Oracle Cloud
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USERNAME }}
        key: ${{ secrets.OCI_KEY }}
        source: "deploy/*"
        target: "/home/${{ secrets.OCI_USERNAME }}/oceanlk-fullstack-${{ env.DEPLOY_ENV }}"
        strip_components: 1

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USERNAME }}
        key: ${{ secrets.OCI_KEY }}
        script: |
          set -e  # Exit on any error
          
          cd /home/${{ secrets.OCI_USERNAME }}/oceanlk-fullstack-${{ env.DEPLOY_ENV }}
          
          echo "Creating Docker network if it doesn't exist..."
          docker network create oceanlk-network 2>/dev/null || true
          
          # ============================================
          # Deploy Backend
          # ============================================
          echo "Building backend Docker image..."
          cd backend
          docker build -t oceanlk-backend:${{ env.DEPLOY_ENV }} .
          
          echo "Stopping and removing old backend container..."
          docker stop ${{ env.BACKEND_CONTAINER }} 2>/dev/null || true
          docker rm ${{ env.BACKEND_CONTAINER }} 2>/dev/null || true
          
          echo "Starting new backend container..."
          docker run -d \
            --name ${{ env.BACKEND_CONTAINER }} \
            --restart always \
            --network oceanlk-network \
            -p ${{ env.BACKEND_PORT }}:8080 \
            --env-file .env \
            -e SERVER_PORT=8080 \
            -e EMAIL_ENABLED=true \
            --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1" \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            oceanlk-backend:${{ env.DEPLOY_ENV }}
          
          # ============================================
          # Deploy Frontend
          # ============================================
          echo "Building frontend Docker image..."
          cd ../frontend
          docker build -t oceanlk-frontend:${{ env.DEPLOY_ENV }} .
          
          echo "Stopping and removing old frontend container..."
          docker stop ${{ env.FRONTEND_CONTAINER }} 2>/dev/null || true
          docker rm ${{ env.FRONTEND_CONTAINER }} 2>/dev/null || true
          
          echo "Starting new frontend container..."
          docker run -d \
            --name ${{ env.FRONTEND_CONTAINER }} \
            --restart always \
            --network oceanlk-network \
            -p ${{ env.FRONTEND_PORT }}:80 \
            --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1" \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            oceanlk-frontend:${{ env.DEPLOY_ENV }}
          
          # ============================================
          # Verify Deployment
          # ============================================
          echo "Waiting for containers to start..."
          sleep 10
          
          echo "Checking backend container status..."
          if ! docker ps | grep -q ${{ env.BACKEND_CONTAINER }}; then
            echo "ERROR: Backend container failed to start"
            docker logs ${{ env.BACKEND_CONTAINER }} --tail 50
            exit 1
          fi
          
          echo "Checking frontend container status..."
          if ! docker ps | grep -q ${{ env.FRONTEND_CONTAINER }}; then
            echo "ERROR: Frontend container failed to start"
            docker logs ${{ env.FRONTEND_CONTAINER }} --tail 50
            exit 1
          fi
          
          # ============================================
          # Cleanup
          # ============================================
          echo "Pruning unused Docker images..."
          docker image prune -f
          
          echo "============================================"
          echo "Deployment completed successfully!"
          echo "Environment: ${{ env.DEPLOY_ENV }}"
          echo "Backend: http://${{ secrets.OCI_HOST }}:${{ env.BACKEND_PORT }}"
          echo "Frontend: http://${{ secrets.OCI_HOST }}:${{ env.FRONTEND_PORT }}"
          echo "============================================"
          
          # Display running containers
          docker ps --filter "name=oceanlk" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
