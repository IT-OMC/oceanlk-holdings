name: Deploy Backend to Oracle Cloud

on:
  push:
    branches: [ "production", "development" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: apps/backend/target/*.jar

    - name: Upload Dockerfile
      uses: actions/upload-artifact@v4
      with:
        name: backend-dockerfile
        path: apps/backend/Dockerfile

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download JAR
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: deploy

    - name: Download Dockerfile
      uses: actions/download-artifact@v4
      with:
        name: backend-dockerfile
        path: deploy

    - name: Set Environment Variables
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
          echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          echo "APP_PORT=8080" >> $GITHUB_ENV
          echo "CONTAINER_NAME=oceanlk-backend-prod" >> $GITHUB_ENV
        else
          echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          echo "APP_PORT=8081" >> $GITHUB_ENV
          echo "CONTAINER_NAME=oceanlk-backend-dev" >> $GITHUB_ENV
        fi

    - name: Create .env file
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
          echo "${{ secrets.ENV_PROD }}" > deploy/.env
        else
          echo "${{ secrets.ENV_DEV }}" > deploy/.env
        fi

    - name: Deploy to Oracle Cloud
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USERNAME }}
        key: ${{ secrets.OCI_KEY }}
        source: "deploy/*"
        target: "/home/${{ secrets.OCI_USERNAME }}/oceanlk-backend-${{ env.DEPLOY_ENV }}"
        strip_components: 1

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USERNAME }}
        key: ${{ secrets.OCI_KEY }}
        script: |
          cd /home/${{ secrets.OCI_USERNAME }}/oceanlk-backend-${{ env.DEPLOY_ENV }}
          
          # Build Docker Image
          docker build -t oceanlk-backend:${{ env.DEPLOY_ENV }} .
          
          # Stop and Remove Existing Container
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          
          # Run New Container
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart always \
            -p ${{ env.APP_PORT }}:8080 \
            --env-file .env \
            oceanlk-backend:${{ env.DEPLOY_ENV }}
            
          # Prune unused images
          docker image prune -f
