version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: oceanlk-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      # Note: port 8081 (actuator management) is NOT exposed — bound to 127.0.0.1 inside container
    environment:
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    networks:
      - oceanlk-network
    # Security hardening
    security_opt:
      - no-new-privileges:true        # Prevent privilege escalation via setuid binaries
    read_only: true                    # Root filesystem is read-only
    tmpfs:
      - /tmp:noexec,nosuid,size=100m  # Spring Boot needs writable /tmp — non-executable
    cap_drop:
      - ALL                            # Drop all Linux capabilities
    # cap_add: []                      # Add back specific caps only if needed (e.g. NET_BIND_SERVICE for port < 1024)
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: oceanlk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - oceanlk-network
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/nginx:noexec,nosuid,size=100m  # Nginx needs writable cache
      - /var/run:noexec,nosuid,size=10m            # Nginx needs to write nginx.pid
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE               # Needed to bind to port 80 (< 1024) as non-root
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  oceanlk-network:
    driver: bridge
